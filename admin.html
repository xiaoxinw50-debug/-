<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅人物语 - 掌柜后台</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6f8; color: #333; }
        * { box-sizing: border-box; outline: none; }
        
        /* 登录遮罩 */
        #login-overlay { position: fixed; inset: 0; background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; text-align: center; }
        .login-box button { background: #5d755d; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; }

        /* 后台布局 */
        .dashboard { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; background: #1e2b3c; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px; color: #c1d3c1; }
        .menu-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .menu-item:hover, .menu-item.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 4px solid #c1d3c1; }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header-title { font-size: 1.8rem; margin-top: 0; margin-bottom: 20px; color: #2c3e50; }
        
        /* 数据卡片 */
        .summary-cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 5px solid #5d755d; }
        .card-title { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
        .card-value { font-size: 2rem; font-weight: bold; color: #2c3e50; }

        /* 数据表格 */
        .data-table { width: 100%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #f8f9fa; color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .data-table tr:hover { background: #fdfdfd; }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-new { background: #e8f4f8; color: #3498db; }
        .status-doing { background: #fef5e7; color: #f39c12; }
        .status-done { background: #eafaf1; color: #2ecc71; }
        
        select.status-select { border: 1px solid #ddd; padding: 5px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:#5d755d; margin-top:0;">掌柜查账</h2>
        <input type="password" id="admin-pwd" placeholder="输入掌柜暗号 (默认: boss888)">
        <button onclick="adminLogin()">进入后台</button>
        <p id="login-msg" style="color:red; font-size:0.8rem; display:none;">暗号错误！</p>
    </div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <h2>⚜ 驿站后台</h2>
        <div class="menu-item active" onclick="switchTab('overview')">📊 数据大盘</div>
        <div class="menu-item" onclick="switchTab('orders')">📝 契约管理 (订单)</div>
        <div class="menu-item" onclick="switchTab('users')">👥 旅人名册 (用户)</div>
        <div style="flex:1;"></div>
        <div class="menu-item" onclick="logoutAdmin()" style="color:#e74c3c;">🚪 退出掌柜</div>
    </div>

    <div class="main-content">
        <div id="overview" class="section active">
            <h1 class="header-title">数据大盘</h1>
            <div class="summary-cards">
                <div class="card">
                    <div class="card-title">总营业额 (RMB)</div>
                    <div class="card-value" id="val-revenue">¥0</div>
                </div>
                <div class="card">
                    <div class="card-title">缔结契约数 (订单)</div>
                    <div class="card-value" id="val-orders">0</div>
                </div>
                <div class="card">
                    <div class="card-title">注册旅人数 (用户)</div>
                    <div class="card-value" id="val-users">0</div>
                </div>
            </div>
            <p style="color:#7f8c8d;">欢迎回来，掌柜的。可以在左侧菜单管理具体业务。</p>
        </div>

        <div id="orders" class="section">
            <h1 class="header-title">契约管理</h1>
            <table class="data-table">
                <thead><tr><th>订单编号</th><th>旅人信息</th><th>购买内容</th><th>实付总额</th><th>时间</th><th>状态操作</th></tr></thead>
                <tbody id="table-orders"></tbody>
            </table>
        </div>

        <div id="users" class="section">
            <h1 class="header-title">旅人名册</h1>
            <table class="data-table">
                <thead><tr><th>系统ID</th><th>账号</th><th>手机号</th><th>昵称</th><th>当前积分</th></tr></thead>
                <tbody id="table-users"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://traveler-tale-shop.onrender.com/api";
    let adminSecret = '';

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(tabId === 'orders') loadOrders();
        if(tabId === 'users') loadUsers();
    }

    async function adminLogin() {
        adminSecret = document.getElementById('admin-pwd').value;
        try {
            // 尝试获取大盘数据来验证密码
            const res = await fetch(`${API_BASE}/admin/summary`, {
                headers: { 'admin-secret': adminSecret, 'Bypass-Tunnel-Reminder': 'true' }
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('val-revenue').innerText = `¥${data.summary.totalRevenue}`;
                document.getElementById('val-orders').innerText = data.summary.orderCount;
                document.getElementById('val-users').innerText = data.summary.userCount;
            } else {
                document.getElementById('login-msg').style.display = 'block';
            }
        } catch (e) { alert("网络连接失败"); }
    }

    function logoutAdmin() {
        adminSecret = '';
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('admin-pwd').value = '';
    }

    async function loadOrders() {
        const res = await fetch(`${API_BASE}/admin/orders`, { headers: { 'admin-secret': adminSecret, 'Bypass-Tunnel-Reminder': 'true' } });
        const data = await res.json();
        const tbody = document.getElementById('table-orders');
        tbody.innerHTML = data.orders.map(o => `
            <tr>
                <td style="font-family:monospace; color:#888;">${o._id.substring(o._id.length-6)}</td>
                <td>
                    <strong>${o.userId ? o.userId.nickname : '未知'}</strong><br>
                    <span style="font-size:0.8rem; color:#888;">${o.userId ? o.userId.phone : '-'}</span>
                </td>
                <td style="font-size:0.85rem;">${o.items.map(i => i.name).join('<br>')}</td>
                <td style="font-weight:bold; color:#5d755d;">¥${o.total}</td>
                <td style="font-size:0.8rem; color:#888;">${new Date(o.createdAt).toLocaleString()}</td>
                <td>
                    <select class="status-select" onchange="updateOrderStatus('${o._id}', this.value)">
                        <option value="已结契" ${o.status==='已结契'?'selected':''}>📝 已结契</option>
                        <option value="制作中" ${o.status==='制作中'?'selected':''}>✂️ 制作中</option>
                        <option value="已发货" ${o.status==='已发货'?'selected':''}>📦 已发货</option>
                    </select>
                </td>
            </tr>
        `).join('');
    }

    async function loadUsers() {
        const res = await fetch(`${API_BASE}/admin/users`, { headers: { 'admin-secret': adminSecret, 'Bypass-Tunnel-Reminder': 'true' } });
        const data = await res.json();
        const tbody = document.getElementById('table-users');
        tbody.innerHTML = data.users.map(u => `
            <tr>
                <td style="font-family:monospace; color:#888; font-size:0.8rem;">${u._id}</td>
                <td>${u.username}</td>
                <td>${u.phone || '-'}</td>
                <td><strong>${u.nickname}</strong></td>
                <td style="color:#b22222; font-weight:bold;">${u.points}</td>
            </tr>
        `).join('');
    }

    async function updateOrderStatus(id, newStatus) {
        try {
            const res = await fetch(`${API_BASE}/admin/orders/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'admin-secret': adminSecret, 'Bypass-Tunnel-Reminder': 'true' },
                body: JSON.stringify({ status: newStatus })
            });
            const data = await res.json();
            if(data.success) alert("状态更新成功！用户将在他们的历史记录里看到最新状态。");
        } catch(e) { alert("更新失败"); }
    }
</script>
</body>
</html>
